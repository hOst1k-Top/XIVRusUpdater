name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip `
            -OutFile latest.zip

          Expand-Archive `
            -Force latest.zip `
            "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Build
        run: dotnet build --configuration Release

      - name: Create Zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path ".\XIVRusUpdater\bin\x64\Release\XIVRusUpdater\*" `
            -DestinationPath "XIVRusUpdater.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: XIVRusUpdater.zip
          generate_release_notes: true